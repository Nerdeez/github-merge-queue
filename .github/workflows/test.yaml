#
# The build workflow calls this workflow with the commit sha of the head commit of the PR.
# The E2E Check is created by the init workflow when the PR is opened; this workflow
# updates that same check. It reads test.result.txt to determine pass/fail and updates
# the check on the PR head commit with the result.
#

name: Test

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'The commit SHA to test'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Get and update existing E2E check
        id: get_check
        uses: actions/github-script@v8
        with:
          script: |
            const commitSha = context.payload.inputs.commit_sha;
            const { data: { check_runs } } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: commitSha
            });
            const e2eCheck = check_runs.find(run => run.name === 'E2E Check');
            if (!e2eCheck) {
              throw new Error('E2E Check not found for this commit. Ensure the init workflow has run for this PR.');
            }
            core.setOutput('check_run_id', e2eCheck.id);
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: e2eCheck.id,
              status: 'in_progress',
              output: {
                title: 'Test is running',
                summary: 'Test workflow is executing'
              }
            });

      - name: Sleep for 3 minutes
        run: sleep 180

      - name: Check test result
        id: check_result
        run: |
          if [ -f test.result.txt ]; then
            RESULT=$(cat test.result.txt | tr -d '[:space:]')
            echo "result=$RESULT" >> $GITHUB_OUTPUT
          else
            echo "result=pass" >> $GITHUB_OUTPUT
          fi

      - name: Update check run with result
        uses: actions/github-script@v8
        with:
          script: |
            const result = '${{ steps.check_result.outputs.result }}';
            const conclusion = result === 'fail' ? 'failure' : 'success';
            const title = result === 'fail' ? 'Test failed' : 'Test passed';
            const summary = result === 'fail' 
              ? 'Test failed based on test.result.txt content'
              : 'Test passed successfully';
            
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: ${{ steps.get_check.outputs.check_run_id }},
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: title,
                summary: summary
              }
            });

      - name: Pass or fail based on result
        run: |
          if [ "${{ steps.check_result.outputs.result }}" = "fail" ]; then
            echo "Test failed based on test.result.txt content"
            exit 1
          else
            echo "Test passed"
          fi